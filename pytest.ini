[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    smoke: Fast validation tests (< 5s each)
    cuda: Requires GPU/CUDA
    slow: Long-running tests (> 30s)
    very_slow: Very long tests (> 5min)
    integration: Component interaction tests
    performance: Benchmark tests
    tensorrt: TensorRT-specific tests
