name: release-candidate

on:
  workflow_dispatch:

jobs:
  validate-release-candidate:
    runs-on: [self-hosted, linux, arm64, jetson]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Prepare release-candidate environment
        run: |
          : > .env
          echo "SECRET_KEY=release-candidate-secret-key" >> .env
          echo "HOST_PORT=10001" >> .env
          echo "FRONTEND_PORT=13000" >> .env
          echo "LOG_LEVEL=info" >> .env

      - name: Validate compose config
        run: docker compose -f docker-compose.yaml config -q

      - name: Start real compose stack
        env:
          AUTOVOICE_RC_PROJECT: autovoice-rc-${{ github.run_id }}
        run: |
          docker compose -p "$AUTOVOICE_RC_PROJECT" -f docker-compose.yaml up -d --build backend frontend

      - name: Validate release candidate endpoints
        run: python scripts/validate_release_candidate.py --base-url http://127.0.0.1:10001 --report-dir reports/platform --wait-seconds 180

      - name: Validate experimental evidence registry
        run: python scripts/validate_experimental_evidence.py

      - name: Capture compose logs
        if: always()
        env:
          AUTOVOICE_RC_PROJECT: autovoice-rc-${{ github.run_id }}
        run: |
          mkdir -p reports/platform
          docker compose -p "$AUTOVOICE_RC_PROJECT" -f docker-compose.yaml ps > reports/platform/release-candidate-compose-ps.txt || true
          docker compose -p "$AUTOVOICE_RC_PROJECT" -f docker-compose.yaml logs backend frontend > reports/platform/release-candidate-compose.log || true

      - name: Stop real compose stack
        if: always()
        env:
          AUTOVOICE_RC_PROJECT: autovoice-rc-${{ github.run_id }}
        run: docker compose -p "$AUTOVOICE_RC_PROJECT" -f docker-compose.yaml down --remove-orphans || true

      - name: Upload RC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-artifacts
          path: |
            reports/platform
          if-no-files-found: ignore
