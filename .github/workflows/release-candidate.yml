name: release-candidate

on:
  workflow_dispatch:

jobs:
  validate-release-candidate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate compose config
        run: docker compose -f docker-compose.yaml config -q

      - name: Start live backend harness
        run: |
          python tests/live_backend_server.py --port 5050 > /tmp/autovoice-rc.log 2>&1 &
          echo $! > /tmp/autovoice-rc.pid
          sleep 5

      - name: Validate release candidate endpoints
        run: python scripts/validate_release_candidate.py --base-url http://127.0.0.1:5050 --skip-compose --report-dir reports/platform

      - name: Stop live backend harness
        if: always()
        run: |
          if [ -f /tmp/autovoice-rc.pid ]; then
            kill "$(cat /tmp/autovoice-rc.pid)" || true
          fi

      - name: Upload RC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-artifacts
          path: |
            reports/platform
            /tmp/autovoice-rc.log
          if-no-files-found: ignore
